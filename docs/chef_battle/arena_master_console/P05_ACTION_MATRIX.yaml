schema_version: "1.0"
document_type: "phase_05_action_matrix"
produced_at: "2026-07-04"
authority: "DG-01 access model: non-owner console operators are read-only; all adverse actions are owner-only with mandatory reasons"

read_models:
  moderation_detail:
    cooking_queue: "ingredient_penalty and cooking battles + per-entry moderation state; owner actions appear only after cooked-photo submission"
    content_reports: "10 newest PENDING ContentReport rows (kind, object, reason)"
    streams: "SCHEDULED/LIVE LiveStreamSession rows + broadcast safety state (moderation status, safety delay, report count, stopped_by_staff) + checklist_confirmed + LiveBattleAgreement presence"
  safety_checklist_note: >-
    Displayed checklist state uses actual data only: checklist_confirmed,
    safety_delay_enabled, agreement_signed, report_count. No automated
    minor/copyright/alcohol detection exists in the repository and none is
    claimed — those items are covered by the chef-confirmed checklist and
    viewer reports.

actions:
  moderate_entry:
    who: "owner only"
    allowed_statuses: [approved, flagged, rejected, needs_changes]
    reason: "required for flagged/rejected/needs_changes; approve needs confirm only"
    reuses: "BattleEntry.moderation_status/note/reviewed_by/reviewed_at"
    side_effects: "OPERATOR_ACTION audit; chef notified (in-site + email) on adverse actions"
    presentation_gate: "approve requires cooked photo + real-photo confirmation; final approval of both participant entries advances COOKING -> PRESENTATION"
  review_report:
    who: "owner only"
    allowed_statuses: [reviewed, actioned, dismissed]
    reason: "note always required"
    reuses: "ContentReport.status/moderator_note/reviewed_by/reviewed_at"
    side_effects: "OPERATOR_ACTION audit (no battle link)"
  end_stream:
    who: "owner only"
    reason: "always required"
    reuses: "LiveStreamSession TERMINATED state machine + LiveBroadcast stopped_by_staff/stop_reason"
    provider_honesty: >-
      NO provider API is called or claimed: ENABLE_LIVE_VIDEO is off and no
      provider service exists. The JSON response and the audit payload both
      carry provider_side_terminated: false, and the UI prompt states it.
    side_effects: "OPERATOR_ACTION audit; chef notified"
  suspend_chef:
    who: "owner only"
    reason: "always required"
    reuses: "ChefBattleProfile.is_suspended/suspended_at/suspension_reason"
    side_effects: "OPERATOR_ACTION audit (battle=None) + LedgerEvent(ACCOUNT_SUSPENDED); chef notified"
    idempotency: "rejects if already suspended (409)"
    console_field: "chef_slug (str), reason (str)"
  unsuspend_chef:
    who: "owner only"
    reason: "not required"
    side_effects: "OPERATOR_ACTION audit (battle=None); chef notified"
    idempotency: "rejects if not suspended (409)"
    console_field: "chef_slug (str)"
  set_fraud_flag:
    who: "owner only"
    reason: "always required (note)"
    reuses: "ChefBattleProfile.fraud_flag/fraud_flag_note"
    side_effects: "OPERATOR_ACTION audit (battle=None) + LedgerEvent(FRAUD_FLAG)"
    idempotency: "rejects if already flagged (409)"
    console_field: "chef_slug (str), reason (str)"
  clear_fraud_flag:
    who: "owner only"
    reason: "not required"
    side_effects: "OPERATOR_ACTION audit (battle=None)"
    idempotency: "rejects if flag not set (409)"
    console_field: "chef_slug (str)"
  approve_cooking_phase: "already reachable via master_action force_status ingredient_penalty->cooking (P03), which calls the owning service"
  emergency_stream_path: "operator_emergency_stop (P03) terminates all live sessions of a battle per DG-03"

read_models_updated_2026_07_10:
  cooking_queue_entries: "now include age_verified/is_suspended/fraud_flag from ChefBattleProfile (safety checklist badges)"
  flagged_chefs: "new section: enrolled chefs with is_suspended=True OR fraud_flag=True (up to 20, ordered by suspended_at)"

privacy:
  - "moderation_note / moderator_note / operator audit payloads never appear in public endpoints (test: moderation_notes_never_public)"
  - "moderation detail served only through the console gate"
