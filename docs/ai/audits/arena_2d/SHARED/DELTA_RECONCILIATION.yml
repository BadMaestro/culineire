  conclusions_amended:
    - "Dark-launch Arena visibility now includes every authenticated user with a RecipeAuthor; Chef Battle enrollment, staff, superuser, and bearseeker privilege are not required for an ordinary author. Anonymous users and authenticated users without an author remain hidden while the public flag is off."
    - "Vote self-protection now includes a database CheckConstraint via BattleVote.voter_author, in addition to Python fraud and validation gates."
    - "New request fingerprints use HMAC-SHA256 keyed by SECRET_KEY and carry hash scheme v2; historical hashes remain labelled v1 and comparisons are scheme-scoped."
    - "Arena color literals were substantially redirected to shared/derived tokens, reducing but not eliminating the independent palette conflict or six-sheet ownership risk."
    - "The current legacy shell is flatter and full-bleed across desktop/mobile; removed perspective/occupant stretching does not change its legacy-presentation classification."
    - "The Arena build board now distinguishes archived, live, and frozen stages with criteria; it is operational documentation, not implementation authority or browser evidence."

  new_risks:
    - "Migration 0083 intentionally stops if historical self-votes exist and would require an owner data decision; production data was not queried during reconciliation."
    - "Nullable voter_author means future vote-writing paths must populate it for author users to receive DB-level self-vote enforcement."
    - "SECRET_KEY rotation changes HMAC outputs while the v2 label does not encode key generation; operational key continuity affects fraud comparisons."
    - "Legacy v1 and current v2 fingerprints are intentionally not cross-compared, creating a limited transition boundary for duplicate/rate detection."
    - "Global --hall-* tokens may make the legacy dark palette appear canonical and may be reused accidentally by a future 2D implementation."
    - "GOLDEN_RULES.md still describes staff/superuser-only visibility while the implementation and dedicated memory rule allow any author."
    - "CHEF_COMBATS_MANIFEST.md prescribes a dark premium/esports direction while MANIFEST_DELTA.md records the owner's light parchment override; the manifest alone is unsafe authority."
    - "Build-board completion claims have no new browser, accessibility, screenshot, or automated viewport evidence."

  contract_changes:
    - "is_battle_visible: public flag OR authenticated staff/superuser OR authenticated user with any RecipeAuthor."
    - "BattleVote: adds nullable voter_author and database constraint voter_author != voted_for."
    - "BattleVote and VoteIntegrityEvent: add indexed hash_scheme with current default v2."
    - "hash_request_value: bare SHA-256 replaced by deterministic HMAC-SHA256 keyed with SECRET_KEY."
    - "Fraud IP/device comparisons: restricted to HASH_SCHEME_CURRENT."
    - "Internal Arena build-board context: archive, stages, later_stages, criterion, and frozen-stage behavior."
    - "Presentation variables: shared hall and rank token vocabulary; no public data/action contract change."

  unresolved_conflicts:
    - "Repository access guidance conflicts: the current implementation allows any RecipeAuthor, while GOLDEN_RULES.md retains older staff/superuser-only wording."
