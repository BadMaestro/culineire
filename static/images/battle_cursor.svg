<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- KNIFE (back layer — handle lower-right, blade upper-left) -->
  <!-- Handle glow -->
  <line x1="33" y1="37" x2="22" y2="24" stroke="#fffaf0" stroke-width="6.5" stroke-linecap="round" opacity="0.38"/>
  <!-- Handle dark walnut -->
  <line x1="33" y1="37" x2="22" y2="24" stroke="#2a1608" stroke-width="4.2" stroke-linecap="round"/>
  <!-- Handle wood grain -->
  <line x1="30" y1="34" x2="25" y2="28" stroke="#4e2e10" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <!-- Bolster -->
  <ellipse cx="21.5" cy="23.5" rx="2.4" ry="2.4" fill="#6a3e14" stroke="#2a1608" stroke-width="0.6"/>
  <!-- Blade back edge glow -->
  <line x1="20" y1="22" x2="7" y2="4" stroke="#fffaf0" stroke-width="3.5" stroke-linecap="round" opacity="0.28"/>
  <!-- Blade back edge (dark) -->
  <line x1="20" y1="22" x2="7" y2="4" stroke="#6a4820" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Blade face (steel) -->
  <line x1="20.9" y1="21.4" x2="8" y2="4.6" stroke="#c0965a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Blade edge highlight (gold) -->
  <line x1="21.6" y1="20.8" x2="8.8" y2="5.2" stroke="#e8bf6e" stroke-width="0.55" stroke-linecap="round" opacity="0.9"/>

  <!-- FORK (front layer — handle lower-left, tines upper-right) -->
  <!-- Handle glow -->
  <line x1="7" y1="37" x2="18" y2="24" stroke="#fffaf0" stroke-width="6.5" stroke-linecap="round" opacity="0.38"/>
  <!-- Handle dark walnut -->
  <line x1="7" y1="37" x2="18" y2="24" stroke="#2a1608" stroke-width="4.2" stroke-linecap="round"/>
  <!-- Handle wood grain -->
  <line x1="10" y1="34" x2="15" y2="28" stroke="#4e2e10" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <!-- Bolster -->
  <ellipse cx="18.5" cy="23.5" rx="2.4" ry="2.4" fill="#6a3e14" stroke="#2a1608" stroke-width="0.6"/>
  <!-- Shank glow -->
  <line x1="19" y1="22" x2="23" y2="14" stroke="#fffaf0" stroke-width="4.2" stroke-linecap="round" opacity="0.3"/>
  <!-- Shank -->
  <line x1="19" y1="22" x2="23" y2="14" stroke="#2a1608" stroke-width="2.7" stroke-linecap="round"/>
  <!-- Tine 1 glow -->
  <line x1="23" y1="14" x2="20" y2="4" stroke="#fffaf0" stroke-width="3.2" stroke-linecap="round" opacity="0.3"/>
  <!-- Tine 1 -->
  <line x1="23" y1="14" x2="20" y2="4" stroke="#2a1608" stroke-width="2" stroke-linecap="round"/>
  <!-- Tine 2 glow -->
  <line x1="23" y1="14" x2="34" y2="7" stroke="#fffaf0" stroke-width="3.2" stroke-linecap="round" opacity="0.3"/>
  <!-- Tine 2 -->
  <line x1="23" y1="14" x2="34" y2="7" stroke="#2a1608" stroke-width="2" stroke-linecap="round"/>

  <!-- Crossing accent dot -->
  <circle cx="20" cy="20" r="1.9" fill="#d4a853" opacity="0.75"/>
</svg>
