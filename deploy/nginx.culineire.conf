upstream culineire_unit {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name culineire.ie www.culineire.ie;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name culineire.ie www.culineire.ie;

    ssl_certificate /etc/letsencrypt/live/culineire.ie/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/culineire.ie/privkey.pem;

    client_max_body_size 6m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (^|/)(\.env|.*\.env.*|config\.env|sendgrid\.env)$ {
        return 444;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(wp-json/|wp-admin/|wp-login\.php|xmlrpc\.php|phpmyadmin|phpMyAdmin|pma|adminer|\.git|\.hg|\.svn|\.aws|actuator/|graphql|graphiql|openapi\.json|swagger-ui\.html|_profiler|_cat/|app/kibana|server-status|server-info|Dockerfile|Procfile|serverless\.ya?ml|firebase-debug\.log|functions/\.runtimeconfig\.json|configuration\.php\.bak|assets/js/(auth|message|qr_modal)\.js|bot-connect\.js|js/(lkk_ch|twint_ch)\.js|css/support_parent\.css) {
        return 444;
        access_log off;
        log_not_found off;
    }

    location /static/ {
        alias /srv/culineire/shared/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location /media/ {
        alias /srv/culineire/shared/media/;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://culineire_unit;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
