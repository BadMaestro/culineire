server {
    listen 80;
    listen [::]:80;
    server_name culineire.ie www.culineire.ie;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 200 "CulinEire TLS bootstrap\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}
