# CulinEire ModSecurity entrypoint.
#
# Install this file as:
#   /etc/nginx/modsec/culineire-main.conf
#
# The Ubuntu packages provide the base engine config and CRS loader paths below.
Include /etc/modsecurity/modsecurity.conf
Include /usr/share/modsecurity-crs/owasp-crs.load

# Site-specific high-confidence probe blocks.
Include /etc/nginx/modsec/culineire-probes.conf
