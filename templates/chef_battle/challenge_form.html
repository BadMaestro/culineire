{% extends "base.html" %}
{% load static %}

{% block title %}Create Chef Battle Challenge | CulinEire{% endblock %}
{% block extra_head %}<link href="{% static 'css/chef_battle.css' %}" rel="stylesheet">{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container battle-form-shell">
    <h1>Create Chef Battle Challenge</h1>
    <form class="battle-form" method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="battle-actions">
        <button class="btn-primary" type="submit">Send Challenge</button>
        <a class="btn-secondary" href="{% url 'chef_battle:home' %}">Cancel</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
