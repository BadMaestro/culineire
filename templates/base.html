<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}CulinEire{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/logo.css' %}">
  <link rel="stylesheet" href="{% static 'css/header.css' %}">  <!-- стили верхней шапки -->

  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <div class="container header-inner">
      <!-- ЛОГОТИП -->
      <a href="{% url 'home' %}" class="logo">
        <img src="{% static 'images/logo-culineire.png' %}"
             alt="CulinEire — Your Culinary Guide with an Irish Heart">
      </a>

      <!-- Кнопка-гамбургер для мобильного меню -->
      <button
        class="nav-toggle"
        type="button"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="main-nav"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Основное меню -->
      <nav class="main-nav" id="main-nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'recipes:recipe_list' %}">Recipes</a>

        <a href="#">Articles</a>
        <a href="#">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="container footer-inner">
      <span>
        © {% now "Y" %} ·
        <span class="brand-culineire">
          <span class="ie-green">Cul</span><span class="ie-white">in</span><span class="ie-orange">Eire</span>
        </span>
        • Your <span class="footer-highlight">Culinary Guide</span> with an
        <span class="footer-highlight">Irish Heart</span> 💚
      </span>
      <span>
        Designed and owned by
        <a href="https://www.bearcave.ie" class="footer-company" target="_blank" rel="noopener noreferrer">
          Bearcave Ltd.
        </a>
      </span>
      <span>
        All rights reserved.
      </span>
    </div>
  </footer>

  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
