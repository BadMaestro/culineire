<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block subject %}CulinEire Kitchen{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
</style>
</head>
<body style="margin:0;padding:0;background-color:#faf6f0;font-family:'Inter',system-ui,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#faf6f0;">
  <tr>
    <td align="center" style="padding:40px 16px;">
      <table role="presentation" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

        <!-- Hero with CulinEire Kitchen overlay -->
        <tr>
          <td style="background-image:url('https://culineire.ie/static/images/hero-welcome.png');background-size:cover;background-position:center;background-color:#184c3a;padding:44px 20px 36px;text-align:center;border-radius:6px 6px 0 0;">
            <a href="https://culineire.ie" style="text-decoration:none;">
              <span style="font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:700;color:#ffffff;letter-spacing:0.04em;text-shadow:0 2px 6px rgba(0,0,0,0.55);">CulinEire Kitchen</span>
            </a>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="background-color:#fffdf9;padding:36px 36px 28px;border-left:1px solid #e0d5c8;border-right:1px solid #e0d5c8;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background-color:#f2eadf;padding:20px 36px;border-radius:0 0 6px 6px;border:1px solid #e0d5c8;border-top:none;text-align:center;">
            <p style="margin:0 0 8px;font-family:'Playfair Display',Georgia,serif;font-size:14px;color:#1f2c25;font-weight:700;">
              CulinEire Kitchen
            </p>
            <p style="margin:0 0 8px;font-family:'Inter',system-ui,sans-serif;font-size:12px;color:#42514a;line-height:1.6;">
              <a href="https://www.culineire.ie/" style="color:#184c3a;text-decoration:none;">www.culineire.ie</a>
              &nbsp;&bull;&nbsp;
              <a href="https://www.instagram.com/culineire/" style="color:#184c3a;text-decoration:none;">Instagram</a>
              &nbsp;&bull;&nbsp;
              <a href="https://www.tiktok.com/@culineire.ie" style="color:#184c3a;text-decoration:none;">TikTok</a>
            </p>
            <p style="margin:0;font-family:'Inter',system-ui,sans-serif;font-size:11px;color:#7a8a82;line-height:1.5;">
              Honouring Irish Culinary Heritage
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
