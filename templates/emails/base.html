<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block subject %}CulinEire{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#faf6f0;font-family:Georgia,'Times New Roman',serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#faf6f0;">
  <tr>
    <td align="center" style="padding:40px 16px;">
      <table role="presentation" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

        <!-- Header -->
        <tr>
          <td style="background-color:#184c3a;padding:26px 36px;border-radius:6px 6px 0 0;text-align:center;">
            <a href="https://culineire.ie" style="text-decoration:none;">
              <span style="font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:bold;color:#faf6f0;letter-spacing:0.06em;">CulinEire</span>
            </a>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="background-color:#fffdf9;padding:36px 36px 28px;border-left:1px solid #e0d5c8;border-right:1px solid #e0d5c8;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background-color:#f2eadf;padding:18px 36px;border-radius:0 0 6px 6px;border:1px solid #e0d5c8;border-top:none;text-align:center;">
            <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:12px;color:#42514a;line-height:1.6;">
              CulinEire &nbsp;&bull;&nbsp; Irish Food &amp; Recipes &nbsp;&bull;&nbsp;
              <a href="https://culineire.ie" style="color:#184c3a;text-decoration:none;">culineire.ie</a>
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
