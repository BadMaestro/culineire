<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block subject %}CulinEire Kitchen{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#faf6f0;font-family:Georgia,'Times New Roman',serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#faf6f0;">
  <tr>
    <td align="center" style="padding:40px 16px;">
      <table role="presentation" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

        <!-- Header -->
        <tr>
          <td style="background-color:#184c3a;padding:26px 36px;border-radius:6px 6px 0 0;text-align:center;">
            <a href="https://culineire.ie" style="text-decoration:none;">
              <span style="font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:bold;color:#faf6f0;letter-spacing:0.06em;">CulinEire Kitchen</span>
            </a>
          </td>
        </tr>

        <!-- Hero image -->
        <tr>
          <td style="padding:0;line-height:0;">
            <img src="https://culineire.ie/static/images/hero-welcome.png" alt="" width="560" style="width:100%;max-width:560px;height:auto;display:block;border:0;">
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="background-color:#fffdf9;padding:36px 36px 28px;border-left:1px solid #e0d5c8;border-right:1px solid #e0d5c8;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background-color:#f2eadf;padding:20px 36px;border-radius:0 0 6px 6px;border:1px solid #e0d5c8;border-top:none;text-align:center;">
            <p style="margin:0 0 8px;font-family:Georgia,'Times New Roman',serif;font-size:13px;color:#1f2c25;font-weight:bold;">
              CulinEire Kitchen
            </p>
            <p style="margin:0 0 8px;font-family:Georgia,'Times New Roman',serif;font-size:12px;color:#42514a;line-height:1.6;">
              <a href="https://www.culineire.ie/" style="color:#184c3a;text-decoration:none;">www.culineire.ie</a>
              &nbsp;&bull;&nbsp;
              <a href="https://www.instagram.com/culineire/" style="color:#184c3a;text-decoration:none;">Instagram</a>
              &nbsp;&bull;&nbsp;
              <a href="https://www.tiktok.com/@culineire.ie" style="color:#184c3a;text-decoration:none;">TikTok</a>
            </p>
            <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:11px;color:#7a8a82;line-height:1.5;">
              Honouring Irish Culinary Heritage
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
