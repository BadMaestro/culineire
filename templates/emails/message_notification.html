{% extends "emails/base.html" %}

{% block subject %}{{ subject }}{% endblock %}

{% block content %}
<h1 style="margin:0 0 16px;font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;color:#1f2c25;line-height:1.3;text-align:center;">{{ subject }}</h1>
<div style="margin:0 0 24px;padding:20px 24px;background-color:#f5eee4;border-left:3px solid #184c3a;border-radius:0 4px 4px 0;">
  <p style="margin:0;font-family:'Inter',system-ui,sans-serif;font-size:15px;color:#1f2c25;line-height:1.7;white-space:pre-wrap;">{{ body }}</p>
</div>
{% if inbox_url %}
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin:0 0 24px;">
  <tr>
    <td style="text-align:center;">
      <a href="{{ inbox_url }}" style="display:inline-block;background-color:#184c3a;color:#faf6f0;font-family:'Inter',system-ui,sans-serif;font-size:14px;font-weight:500;text-decoration:none;padding:12px 28px;border-radius:4px;">View Message</a>
    </td>
  </tr>
</table>
{% endif %}
<hr style="margin:20px 0;border:none;border-top:1px solid #e0d5c8;">
<p style="margin:0;font-family:'Inter',system-ui,sans-serif;font-size:12px;color:#7a8a82;line-height:1.5;text-align:center;">
  You can manage Your messages at
  <a href="https://culineire.ie/messages/" style="color:#184c3a;">culineire.ie/messages/</a>
</p>
{% endblock %}
