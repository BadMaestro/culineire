{% extends "emails/base.html" %}

{% block subject %}{{ subject }}{% endblock %}

{% block content %}
<h1 style="margin:0 0 16px;font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:bold;color:#1f2c25;line-height:1.3;">{{ subject }}</h1>
<div style="margin:0 0 24px;padding:20px 24px;background-color:#f5eee4;border-left:3px solid #184c3a;border-radius:0 4px 4px 0;">
  <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:15px;color:#1f2c25;line-height:1.7;white-space:pre-wrap;">{{ body }}</p>
</div>
{% if inbox_url %}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
  <tr>
    <td>
      <a href="{{ inbox_url }}" style="display:inline-block;background-color:#184c3a;color:#faf6f0;font-family:Georgia,'Times New Roman',serif;font-size:14px;font-weight:bold;text-decoration:none;padding:11px 24px;border-radius:4px;">View Message</a>
    </td>
  </tr>
</table>
{% endif %}
<hr style="margin:20px 0;border:none;border-top:1px solid #e0d5c8;">
<p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:12px;color:#7a8a82;line-height:1.5;">
  This is a notification from CulinEire. You can manage your messages at
  <a href="https://culineire.ie/messages/" style="color:#184c3a;">culineire.ie/messages/</a>
</p>
{% endblock %}
